<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./css/style.css" rel="stylesheet">
    <link href="./css/style_new.css" rel="stylesheet">
    <title>품목 선택</title>
</head>
<body>
    <div class="page-container">

        <header class="header">
            <button type="button" class="btn-back" id="backButton" data-action="back">
                <img src="./images/common/btn-back-new.png" alt="뒤로가기">
            </button>
            <h1 class="header-title">품목 선택</h1>
            <a href="#" class="btn-home"><img src="./images/common/btn-home-new.png" alt="home"></a>
        </header>
    
        <main>
            
            <div class="content-area">
              <section class="result-section">
                <div class="result-list">
                  <table class="result-table">
                    <colgroup>
                      <col class="w-10">
                      <col>
                    </colgroup>
                    <tbody>
                      <tr>
                        <td><input type="checkbox"/></td>
                        <td><div class="truncate text-sm">주식회사 영광</div></td>
                        
                      </tr>
                      <tr>
                        <td><input type="checkbox"/></td>
                        <td><div class="truncate text-sm">주식회사 아브라카타브라</div></td>
                        
                      </tr>
                      <tr>
                        <td><input type="checkbox"/></td>
                        <td><div class="truncate text-sm">주식회사 바야흐로</div></td>
                        
                      </tr>
                      <tr>
                        <td><input type="checkbox"/></td>
                        <td><div class="truncate text-sm">주식회사 가시나무</div></td>
                        
                      </tr>
                      <tr>
                        <td><input type="checkbox"/></td>
                        <td><div class="truncate text-sm">영창피아노(주)</div></td>
                        
                      </tr>
                    </tbody>
                  </table>
                </div>
              </section>
             
              <section class="checked-list">

              </section>
              
            </div>
        </main>
        <div class="footer">
            <div class="footer-btn-group">
                <button type="button" class="btn btn-primary">선택</button>
                <button type="button" class="btn btn-secondary">닫기</button>
            </div>
        </div>
    </div>
    <script src="./js/scripts_new.js"></script>
</body>
</html>
