<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./css/style.css" rel="stylesheet">
</head>

<body>
    <div class="min-h-dvh flex flex-col bg-fbf3e6">
        <header class="flex justify-between items-center px-5 py-4 bg-white border-b border-f7dfb5">
            <h1 class="font-nanum-extrabold text-lg text-333">예다함 최고장 서비스</h1>
            <a href="#"><img src="./images/logo.png" alt="logo"></a>
        </header>
        <main class="flex-1 px-4 py-5 ">
            <div class="bg-white rounded-2xl px-5 py-6 border border-f7dfb5">
                <p class="flex justify-center mt-4">
                    <img src="./images/main_vis.png" alt="">
                </p>
                <p class="mt-4 text-center font-nanum-extrabold text-333 text-2xl">
                    예다함 보안화면<br />
                    비밀번호를 입력해주세요
                </p>
                <p class="mt-4 text-center text-sm">개인고객 : 생년월일 앞 6자리 입력<br />
                    법인고객 : 사업자번호 10자리 입력</p>
                <div class="mt-6">
                    <input type="password" placeholder="비밀번호 입력"
                        class="leading-none w-full rounded-md border border-ddd bg-fff p-4 outline-none focus:ring-0 focus:outline-none focus:border-6b4e1e">
                    <button
                        class="w-full  bg-6b4e1e text-white leading-none mt-4 p-4 rounded-md cursor-pointer">확인</button>
                </div>
                <p class="mt-4 text-sm flex">
                    <span class="mr-1">*</span>
                    <span>본 페이지는 고객님의 정보 보호를 위하여 암호화된 보안 화면입니다.</span>
                </p>
            </div>
        </main>
        <footer class="flex justify-between px-4 py-6 bg-5c5550 ">
            <div class=" ">
                <div><img src="./images/footer_logo.png" alt="footer_logo"></div>
                <div class="mt-2 text-f5 text-xs">
                    The-K 예다함(주)<br />
                    서울시 마포구 마포대로 86 14층(도화동, 창강빌딩)<br />
                    예다함 고객센터 <a href="tel:1566-6644" class="text-438aff">1566-6644</a></div>
            </div>
            <div><img src="./images/ccm.png" alt="ccm"></div>
        </footer>
    </div>
</body>
